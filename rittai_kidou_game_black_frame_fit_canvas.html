<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>立体機動装置 Prototype 黒枠内フィット版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{
overflow:hidden;
background:#000;
touch-action:none;
--doc-top-safe:58px;
--doc-bottom-safe:76px;
--game-top:var(--doc-top-safe);
--game-bottom:var(--doc-bottom-safe);
}
canvas{display:block}

#game{
position:fixed;
background:#000;
transform-origin:top left;
}

#tapShield{
position:fixed;
z-index:20;
touch-action:none;
background:transparent;
}

#minimap,
#fullMap{
position:static !important;
inset:auto !important;
display:block;
background:#f5f5f5;
}

#toggleInfo{
position:fixed;top:64px;left:18px;z-index:50;
border:none;background:rgba(20,20,20,.55);color:#fff;border-radius:12px;
padding:8px 12px;font-size:13px;font-weight:700;backdrop-filter:blur(4px)
}
.info{
position:fixed;top:52px;left:12px;z-index:30;display:none;
background:rgba(20,20,20,.48);color:#fff;padding:12px 14px;border-radius:14px;
line-height:1.55;font-size:12px;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.18);
backdrop-filter:blur(5px)
}
.info .title{font-weight:700;margin-bottom:4px}

.hud{
position:fixed;top:64px;right:18px;z-index:30;
background:rgba(20,20,20,.38);color:#fff;padding:8px 10px;border-radius:12px;
font-size:12px;line-height:1.5;min-width:120px;text-align:right;
backdrop-filter:blur(5px)
}
.small{opacity:.8}

.crosshair{
position:fixed;top:50%;left:50%;width:24px;height:24px;
margin-left:-12px;margin-top:-12px;pointer-events:none;z-index:25
}
.crosshair:before,.crosshair:after{content:"";position:absolute;background:rgba(0,0,0,.85);border-radius:2px}
.crosshair:before{width:24px;height:2px;top:11px;left:0}
.crosshair:after{width:2px;height:24px;left:11px;top:0}

.clear{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
font-size:52px;font-weight:800;color:#fff;text-shadow:0 0 18px rgba(0,0,0,.55);
display:none;z-index:40
}

.ui{
position:fixed;
left:10vw;
right:10vw;
bottom:76px;
display:flex;
justify-content:space-between;
align-items:flex-end;
z-index:35;
pointer-events:none
}
.ui>*{pointer-events:auto}
.dpad{display:grid;grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px 64px;gap:8px}
.btn{
border:none;background:rgba(255,255,255,.68);border-radius:16px;
font-size:22px;font-weight:700;box-shadow:0 8px 18px rgba(0,0,0,.12);
user-select:none;-webkit-user-select:none;color:#111
}
.btn:active{transform:scale(.98)}
.actionArea{display:flex;flex-direction:column;gap:10px}
.action{width:78px;height:78px;border-radius:50%}

.tapHint{
position:fixed;left:50%;bottom:112px;transform:translateX(-50%);
background:rgba(0,0,0,.28);color:#fff;padding:7px 11px;border-radius:999px;
font-size:11px;z-index:28;backdrop-filter:blur(4px)
}

.minimap{
position:fixed;right:18px;top:172px;z-index:34;
width:112px;height:112px;background:rgba(255,255,255,.78);
border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:7px
}
.minimap canvas{
width:100%;
height:100%;
display:block;
border-radius:10px;
background:#f5f5f5;
position:static !important;
}


.systemBtns{
position:fixed;
left:50%;
top:64px;
transform:translateX(-50%);
z-index:37;
display:flex;
flex-direction:row;
gap:8px;
align-items:center;
}
.systemBtns button{
border:none;background:rgba(255,255,255,.82);border-radius:12px;
padding:8px 12px;font-size:13px;font-weight:700;box-shadow:0 8px 18px rgba(0,0,0,.14)
}

.mapBtn{
position:fixed;right:18px;top:294px;z-index:36;
border:none;background:rgba(255,255,255,.82);border-radius:12px;
padding:8px 12px;font-size:13px;font-weight:700;box-shadow:0 8px 18px rgba(0,0,0,.14)
}
.mapOverlay{
position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.55);
display:none;align-items:center;justify-content:center;padding:24px
}
.mapPanel{
width:min(92vw,900px);height:min(86vh,900px);background:#fff;border-radius:18px;
box-shadow:0 16px 40px rgba(0,0,0,.25);padding:16px;display:flex;flex-direction:column;gap:12px
}
.mapPanelHeader{
display:flex;justify-content:space-between;align-items:center;font-weight:700
}
.mapPanel canvas{
width:100%;
height:auto;
aspect-ratio:1/1;
max-height:calc(86vh - 80px);
display:block;
background:#f5f5f5;
border-radius:14px;
object-fit:contain;
position:static !important;
}
.closeMap{
border:none;background:#111;color:#fff;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:700
}

body.auto-camera .dpad{display:none !important;}
body.auto-camera .ui{
  justify-content:flex-end;
}
body.auto-camera .actionArea{
  margin-right:0;
}
@media (max-width: 700px){
  .info{font-size:11px;max-width:220px}
  .dpad{grid-template-columns:58px 58px 58px;grid-template-rows:58px 58px 58px}
  .action{width:74px;height:74px}
  .minimap{width:100px;height:100px}
}

.info,
.tapHint{
  display:none !important;
}

.info,
.tapHint{
  display:none !important;
}

/* UI重なり防止: 中央寄せ比率は維持しつつ、狭い画面では安全位置へ逃がす */
@media (max-width: 760px){
  .systemBtns{
    top:108px;
    left:50%;
    transform:translateX(-50%);
    gap:6px;
  }
  .systemBtns button{
    padding:7px 9px;
    font-size:12px;
  }
  #toggleInfo{
    top:64px;
    left:16px;
  }
  .hud{
    top:64px;
    right:16px;
    min-width:104px;
    font-size:11px;
  }
  .minimap{
    top:150px;
    right:16px;
    width:92px;
    height:92px;
  }
  .mapBtn{
    top:250px;
    right:16px;
    padding:7px 10px;
    font-size:12px;
  }
  .ui{
    left:8vw;
    right:8vw;
    bottom:78px;
  }
}

@media (max-width: 520px){
  .systemBtns{
    top:116px;
  }
  .systemBtns button{
    padding:6px 8px;
    font-size:11px;
  }
  .hud{
    top:62px;
    right:12px;
    min-width:96px;
    padding:7px 8px;
  }
  #toggleInfo{
    top:62px;
    left:12px;
    padding:7px 10px;
    font-size:12px;
  }
  .minimap{
    top:158px;
    right:12px;
    width:86px;
    height:86px;
  }
  .mapBtn{
    top:252px;
    right:12px;
  }
  .ui{
    left:7vw;
    right:7vw;
    bottom:82px;
  }
}


.nearWallWarning{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
z-index:24;
pointer-events:none;
display:none;
width:42vw;
height:42vh;
border-radius:22px;
background:radial-gradient(circle, rgba(255,80,40,.18) 0%, rgba(255,80,40,.10) 42%, rgba(255,80,40,0) 72%);
border:2px solid rgba(255,100,60,.35);
box-shadow:0 0 28px rgba(255,70,20,.18) inset;
}
.nearWallWarning::after{
content:"WALL CLOSE";
position:absolute;
left:50%;
bottom:14px;
transform:translateX(-50%);
font-size:12px;
font-weight:800;
color:rgba(255,255,255,.82);
text-shadow:0 1px 4px rgba(0,0,0,.5);
letter-spacing:.08em;
}

#docTopBar,
#docBottomBar{
position:fixed;
left:0;
right:0;
background:#000;
z-index:5;
pointer-events:none;
}
#docTopBar{top:0;height:var(--doc-top-safe);}
#docBottomBar{bottom:0;height:var(--doc-bottom-safe);}

@media (max-width:760px){
  .systemBtns{top:calc(var(--game-top) + 58px) !important;}
  #toggleInfo{top:calc(var(--game-top) + 12px) !important;}
  .hud{top:calc(var(--game-top) + 12px) !important;}
  .minimap{top:calc(var(--game-top) + 96px) !important;}
  .mapBtn{top:calc(var(--game-top) + 198px) !important;}
  .ui{bottom:calc(var(--game-bottom) + 18px) !important;}
}
@media (max-width:520px){
  .systemBtns{top:calc(var(--game-top) + 62px) !important;}
  .ui{bottom:calc(var(--game-bottom) + 12px) !important;}
}

.minimap{
  width:112px !important;
  height:112px !important;
}
.minimap canvas{
  width:100% !important;
  height:100% !important;
}
.mapPanel canvas{
  width:100% !important;
  height:auto !important;
  aspect-ratio:1/1 !important;
  object-fit:contain !important;
}
</style>

</head>
<body>
<div id="docTopBar"></div>
<div id="docBottomBar"></div>

<button id="toggleInfo">操作</button>
<div id="infoBox" class="info">
  <div class="title">立体機動装置 Prototype</div>
  <div>↑↓：視線上下</div>
  <div>←→：左右旋回</div>
  <div>左半分タップ：左ワイヤー</div>
  <div>右半分タップ：右ワイヤー</div>
  <div>A：巻き取り</div>
  <div>完全めり込み防止＋地面フック＋壁蹴り＋ワイヤー調整＋タイムアタック版</div>
  <div>B：両ワイヤー解除</div>
</div>

<div class="hud">
  <div id="timeText">T:0.00</div>
  <div id="heightText">H:0</div>
  <div id="speedText">S:0</div>
  <div id="wireText" class="small">L:OFF / R:OFF</div>
  <div id="stateText" class="small">GROUND</div>
</div>

<div class="crosshair"></div>
<div class="tapHint">左タップ=左ワイヤー / 右タップ=右ワイヤー</div>
<div id="clear" class="clear">CLEAR!!</div>
<div id="resultText" class="clear" style="top:58%; font-size:34px; display:none;"></div>

<div class="systemBtns">
  <button id="resetRunBtn">リセット</button>
  <button id="respawnBtn">リスポーン</button>
  <button id="cameraModeBtn">AUTO CAM</button>
</div>

<canvas id="game"></canvas>
<div id="tapShield"></div>
<div id="nearWallWarning" class="nearWallWarning"></div>

<button id="mapBtn" class="mapBtn">地図</button>
<div class="minimap"><canvas id="minimap" width="112" height="112"></canvas></div>

<div id="mapOverlay" class="mapOverlay" style="display:none;">
  <div class="mapPanel">
    <div class="mapPanelHeader">
      <div>全体マップ</div>
      <button id="closeMap" class="closeMap">閉じる</button>
    </div>
    <canvas id="fullMap" width="900" height="900"></canvas>
  </div>
</div>

<div class="ui">
  <div class="dpad">
    <div></div><button class="btn" id="up">↑</button><div></div>
    <button class="btn" id="left">←</button><div></div><button class="btn" id="right">→</button>
    <div></div><button class="btn" id="down">↓</button><div></div>
  </div>
  <div class="actionArea">
    <button class="btn action" id="reel">A</button>
    <button class="btn action" id="release">B</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const tapShield = document.getElementById("tapShield");
const nearWallWarning = document.getElementById("nearWallWarning");
const ctx = canvas.getContext("2d");
const clearUI = document.getElementById("clear");
const resultText = document.getElementById("resultText");
const timeText = document.getElementById("timeText");
const heightText = document.getElementById("heightText");
const speedText = document.getElementById("speedText");
const wireText = document.getElementById("wireText");
const stateText = document.getElementById("stateText");

let runStartTime = performance.now();
let clearTime = null;
const minimapCanvas = document.getElementById("minimap");
const minimapCtx = minimapCanvas.getContext("2d");
const fullMapCanvas = document.getElementById("fullMap");
const fullMapCtx = fullMapCanvas.getContext("2d");
const mapBtn = document.getElementById("mapBtn");
const mapOverlay = document.getElementById("mapOverlay");
const closeMapBtn = document.getElementById("closeMap");
const toggleInfoBtn = document.getElementById("toggleInfo");
const infoBox = document.getElementById("infoBox");
const cameraModeBtn = document.getElementById("cameraModeBtn");

let autoCameraMode = false;

function getSafeFrame(){
  const styles = getComputedStyle(document.body);
  const top = parseFloat(styles.getPropertyValue("--doc-top-safe")) || 0;
  const bottom = parseFloat(styles.getPropertyValue("--doc-bottom-safe")) || 0;
  return {top, bottom, height: Math.max(240, innerHeight - top - bottom)};
}

function layoutGameCanvas(){
  const safe = getSafeFrame();

  // 内部解像度は元の全画面サイズのまま。
  // これにより、今まで見えていたゲーム画面全体を保持する。
  canvas.width = innerWidth;
  canvas.height = innerHeight;

  // 表示サイズだけ、黒枠内に比率維持で縮小する。
  const scale = Math.min(1, innerWidth / canvas.width, safe.height / canvas.height);
  const displayW = canvas.width * scale;
  const displayH = canvas.height * scale;
  const left = (innerWidth - displayW) / 2;
  const top = safe.top + (safe.height - displayH) / 2;

  canvas.style.left = left + "px";
  canvas.style.top = top + "px";
  canvas.style.width = displayW + "px";
  canvas.style.height = displayH + "px";

  // タップ吸収レイヤーも、実際に見えているゲーム画面にだけ重ねる。
  tapShield.style.left = left + "px";
  tapShield.style.top = top + "px";
  tapShield.style.width = displayW + "px";
  tapShield.style.height = displayH + "px";

  minimapCanvas.width = 112;
  minimapCanvas.height = 112;
  fullMapCanvas.width = 900;
  fullMapCanvas.height = 900;
}

function resize(){
  layoutGameCanvas();
}
resize();
addEventListener("resize", resize);

// タップ吸収レイヤー用: 長押し/ダブルタップ/スクロールを軽く抑制
document.addEventListener("contextmenu", e => e.preventDefault(), {passive:false});
document.addEventListener("dblclick", e => e.preventDefault(), {passive:false});
document.addEventListener("gesturestart", e => e.preventDefault(), {passive:false});
document.addEventListener("gesturechange", e => e.preventDefault(), {passive:false});
document.addEventListener("gestureend", e => e.preventDefault(), {passive:false});
document.addEventListener("touchmove", e => {
  if(mapOverlay && mapOverlay.style.display === "flex") return;
  e.preventDefault();
}, {passive:false});

toggleInfoBtn.onclick = () => {
  infoBox.style.display = infoBox.style.display === "block" ? "none" : "block";
};

function updateCameraModeUI(){
  document.body.classList.toggle("auto-camera", autoCameraMode);
  cameraModeBtn.textContent = autoCameraMode ? "MANUAL CAM" : "AUTO CAM";
  input.up = false;
  input.down = false;
  input.left = false;
  input.right = false;
}

cameraModeBtn.addEventListener("click", () => {
  autoCameraMode = !autoCameraMode;
  updateCameraModeUI();
});
mapBtn.addEventListener("click", () => {
  fullMapCanvas.width = 900;
  fullMapCanvas.height = 900;
  mapOverlay.style.display = "flex";
});
closeMapBtn.addEventListener("click", () => { mapOverlay.style.display = "none"; });
mapOverlay.addEventListener("click", (e) => { if(e.target === mapOverlay) mapOverlay.style.display = "none"; });
resetRunBtn.addEventListener("click", resetRun);
respawnBtn.addEventListener("click", respawnPlayer);

const input = {up:false,down:false,left:false,right:false,reel:false,release:false};

function bindButton(id,key){
  const el = document.getElementById(id);
  const on = e => { e.preventDefault(); input[key] = true; };
  const off = e => { e.preventDefault(); input[key] = false; };
  ["touchstart","mousedown","pointerdown"].forEach(ev => el.addEventListener(ev,on,{passive:false}));
  ["touchend","touchcancel","mouseup","mouseleave","pointerup","pointercancel"].forEach(ev => el.addEventListener(ev,off,{passive:false}));
}
["up","down","left","right","reel","release"].forEach(v => bindButton(v,v));

document.addEventListener("keydown", e => {
  if(e.key==="ArrowUp") input.up = true;
  if(e.key==="ArrowDown") input.down = true;
  if(e.key==="ArrowLeft") input.left = true;
  if(e.key==="ArrowRight") input.right = true;
  if(e.key.toLowerCase()==="a") input.reel = true;
  if(e.key.toLowerCase()==="b") input.release = true;
});
document.addEventListener("keyup", e => {
  if(e.key==="ArrowUp") input.up = false;
  if(e.key==="ArrowDown") input.down = false;
  if(e.key==="ArrowLeft") input.left = false;
  if(e.key==="ArrowRight") input.right = false;
  if(e.key.toLowerCase()==="a") input.reel = false;
  if(e.key.toLowerCase()==="b") input.release = false;
});

const FOV = 520;
const GRAVITY = 0.11;
const PLAYER_RADIUS = 26;
const PLAYER_HEIGHT = 70;
const EYE_HEIGHT = 55;
const DRAG_XY = 0.993;
const DRAG_Z = 0.996;
const MAP_CENTER_X = 6200;
const MAP_CENTER_Y = 6200;
const MAP_RADIUS = 5600;

const player = {
  x: 1800, y: 1800, z: 0,
  vx: 0, vy: 0, vz: 0,
  yaw: 0, pitch: 0,
  grounded: true,
  onRoof: false,
  camRoll: 0,
  wallKickCooldown: 0,
  lastWallNormalX: 0,
  lastWallNormalY: 0,
  landingTimer: 0,
  wallTouchTimer: 0,
  wallKickTimer: 0,
  jumpTimer: 0,
  wires: {
    left: { hooked:false, x:0, y:0, z:0, ropeLength:0 },
    right:{ hooked:false, x:0, y:0, z:0, ropeLength:0 }
  }
};

const goal = {x: 9800, y: 9000, w: 170, h: 340, cleared: false};

const spawnPoint = {x: 1800, y: 1800, z: 0, yaw: 0, pitch: 0};

function resetRun(){
  player.x = spawnPoint.x;
  player.y = spawnPoint.y;
  player.z = spawnPoint.z;
  player.vx = 0;
  player.vy = 0;
  player.vz = 0;
  player.yaw = spawnPoint.yaw;
  player.pitch = spawnPoint.pitch;
  player.grounded = true;
  player.onRoof = false;
  player.landingTimer = 0;
  player.wallTouchTimer = 0;
  player.wallKickTimer = 0;
  player.jumpTimer = 0;
  player.wires.left.hooked = false;
  player.wires.right.hooked = false;
  clearUI.style.display = "none";
  resultText.style.display = "none";
  goal.cleared = false;
  clearTime = null;
  runStartTime = performance.now();
}

function respawnPlayer(){
  player.x = spawnPoint.x;
  player.y = spawnPoint.y;
  player.z = 220;
  player.vx = 0;
  player.vy = 0;
  player.vz = 0;
  player.landingTimer = 0;
  player.wallTouchTimer = 0;
  player.wallKickTimer = 0;
  player.jumpTimer = 0;
  player.wires.left.hooked = false;
  player.wires.right.hooked = false;
}



const buildings = [];
const worldWalls = [];
const landmarks = [];

function addBuilding(x,y,w,d,h,style="plaster",district="mid"){
  buildings.push({x,y,w,d,h,style,district});
}

// More intentional city layout: avenues, dense districts, plazas, towers
const roadGap = 420;
const blockCount = 22;
for(let gz=0; gz<blockCount; gz++){
  for(let gx=0; gx<blockCount; gx++){
    const baseX = 850 + gx*roadGap;
    const baseY = 850 + gz*roadGap;

    const centralAvenue = gx===5 || gx===11 || gx===16 || gz===4 || gz===10 || gz===15;
    const plaza = (gx>=8 && gx<=10 && gz>=8 && gz<=10) || (gx>=14 && gx<=15 && gz>=5 && gz<=6);
    const edgeSparse = gx<2 || gz<2 || gx>19 || gz>19;
    if(plaza) continue;
    if(centralAvenue && Math.random() < 0.86) continue;
    if(edgeSparse && Math.random() < 0.35) continue;
    if(Math.random() < 0.10) continue;

    const distFromCenter = Math.hypot(gx-11, gz-11);
    const district = distFromCenter < 5 ? "center" : (distFromCenter < 8 ? "mid" : "edge");

    const count = district === "center" ? (Math.random()<0.45 ? 2 : 1) : (Math.random()<0.22 ? 2 : 1);
    const stylePool = district === "center"
      ? ["brick","stone","plaster","brick"]
      : district === "mid"
      ? ["plaster","brick","timber"]
      : ["timber","plaster","stone"];
    const style = stylePool[Math.floor(Math.random()*stylePool.length)];

    const baseH = district === "center" ? 340 : district === "mid" ? 260 : 220;
    const heightJitter = district === "center" ? 420 : district === "mid" ? 300 : 220;

    if(count === 1){
      addBuilding(
        baseX + 8 + Math.random()*40,
        baseY + 8 + Math.random()*40,
        150 + Math.random()*78,
        150 + Math.random()*78,
        baseH + Math.random()*heightJitter,
        style,
        district
      );
    }else{
      addBuilding(baseX+10, baseY+12, 88+Math.random()*24, 118+Math.random()*24, baseH-30 + Math.random()*heightJitter*0.7, style, district);
      addBuilding(baseX+122, baseY+28, 92+Math.random()*26, 100+Math.random()*28, baseH + Math.random()*heightJitter, style, district);
    }
  }
}

// complete perimeter wall
for(let i=0;i<260;i++){
  const ang = (Math.PI*2/260)*i;
  const r = MAP_RADIUS;
  worldWalls.push({
    x: MAP_CENTER_X + Math.cos(ang)*r,
    y: MAP_CENTER_Y + Math.sin(ang)*r,
    w: 170, d: 170, h: 820, style:"wall"
  });
}

// landmarks / towers
landmarks.push({x: 3600, y: 3300, w: 220, d: 220, h: 900, style:"tower"});
landmarks.push({x: 7600, y: 2700, w: 240, d: 240, h: 980, style:"tower"});
landmarks.push({x: 8400, y: 7200, w: 260, d: 260, h: 1100, style:"tower"});

const solidBoxes = [...buildings, ...worldWalls, ...landmarks];

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

function rectContainsXY(box, x, y, margin=0){
  return x >= box.x - margin && x <= box.x + box.w + margin &&
         y >= box.y - margin && y <= box.y + box.d + margin;
}

function getSupportHeight(x, y, bottomZ, prevBottomZ){
  let best = 0;
  let bestType = "GROUND";
  for(const box of solidBoxes){
    const top = box.h;
    if(rectContainsXY(box, x, y, PLAYER_RADIUS*0.82)){
      const descendingThroughTop = prevBottomZ >= top - 8 && bottomZ <= top + 10;
      const nearTop = Math.abs(bottomZ - top) < 16;
      if((descendingThroughTop || nearTop) && top > best){
        best = top;
        bestType = "ROOF";
      }
    }
  }
  return {height: best, type: bestType};
}

function collideHorizontalAxis(nx, ny, zBottom, prevX, prevY, axis){
  let resultX = nx;
  let resultY = ny;
  let hit = false;

  for(const box of solidBoxes){
    const verticalOverlap = zBottom < box.h - 2 && zBottom + PLAYER_HEIGHT > 0;
    if(!verticalOverlap) continue;

    const overlapX = resultX + PLAYER_RADIUS > box.x && resultX - PLAYER_RADIUS < box.x + box.w;
    const overlapY = resultY + PLAYER_RADIUS > box.y && resultY - PLAYER_RADIUS < box.y + box.d;

    if(overlapX && overlapY){
      hit = true;
      if(axis === "x"){
        if(prevX <= box.x - PLAYER_RADIUS){
          resultX = box.x - PLAYER_RADIUS;
        }else if(prevX >= box.x + box.w + PLAYER_RADIUS){
          resultX = box.x + box.w + PLAYER_RADIUS;
        }else{
          const leftDist = Math.abs((box.x - PLAYER_RADIUS) - prevX);
          const rightDist = Math.abs((box.x + box.w + PLAYER_RADIUS) - prevX);
          resultX = leftDist < rightDist ? box.x - PLAYER_RADIUS : box.x + box.w + PLAYER_RADIUS;
        }
      }else{
        if(prevY <= box.y - PLAYER_RADIUS){
          resultY = box.y - PLAYER_RADIUS;
        }else if(prevY >= box.y + box.d + PLAYER_RADIUS){
          resultY = box.y + box.d + PLAYER_RADIUS;
        }else{
          const topDist = Math.abs((box.y - PLAYER_RADIUS) - prevY);
          const bottomDist = Math.abs((box.y + box.d + PLAYER_RADIUS) - prevY);
          resultY = topDist < bottomDist ? box.y - PLAYER_RADIUS : box.y + box.d + PLAYER_RADIUS;
        }
      }
    }
  }
  return {x: resultX, y: resultY, hit};
}

function resolveWallPenetration(px, py, pz){
  let x = px;
  let y = py;
  let hit = false;
  let normalX = 0;
  let normalY = 0;

  for(let pass = 0; pass < 8; pass++){
    let changed = false;

    for(const box of solidBoxes){
      const verticalOverlap = pz < box.h - 2 && pz + PLAYER_HEIGHT > 0;
      if(!verticalOverlap) continue;

      const overlapX = x + PLAYER_RADIUS > box.x && x - PLAYER_RADIUS < box.x + box.w;
      const overlapY = y + PLAYER_RADIUS > box.y && y - PLAYER_RADIUS < box.y + box.d;

      if(overlapX && overlapY){
        hit = true;

        const moveLeft = (box.x - PLAYER_RADIUS) - x;
        const moveRight = (box.x + box.w + PLAYER_RADIUS) - x;
        const moveTop = (box.y - PLAYER_RADIUS) - y;
        const moveBottom = (box.y + box.d + PLAYER_RADIUS) - y;

        const options = [
          {axis:"x", delta:moveLeft, abs:Math.abs(moveLeft), nx:-1, ny:0},
          {axis:"x", delta:moveRight, abs:Math.abs(moveRight), nx:1, ny:0},
          {axis:"y", delta:moveTop, abs:Math.abs(moveTop), nx:0, ny:-1},
          {axis:"y", delta:moveBottom, abs:Math.abs(moveBottom), nx:0, ny:1},
        ].sort((a,b)=>a.abs-b.abs);

        const best = options[0];
        normalX = best.nx;
        normalY = best.ny;

        if(best.axis === "x"){
          x += best.delta;
        }else{
          y += best.delta;
        }

        changed = true;
      }
    }

    if(!changed) break;
  }

  return {x, y, hit, normalX, normalY};
}

function movePlayerWithCollisions(prevX, prevY, prevZ){
  let x = prevX;
  let y = prevY;
  let z = prevZ;

  let vx = player.vx;
  let vy = player.vy;
  const totalVZ = player.vz;

  const speed = Math.hypot(vx, vy, totalVZ);
  const steps = Math.max(1, Math.ceil(speed / 18));

  let wallHit = false;
  let wallNormalX = 0;
  let wallNormalY = 0;

  for(let i=0; i<steps; i++){
    let stepVX = vx / steps;
    let stepVY = vy / steps;
    let nextX = x + stepVX;
    let nextY = y + stepVY;
    let nextZ = z + totalVZ / steps;

    const xMove = collideHorizontalAxis(nextX, y, nextZ, x, y, "x");
    nextX = xMove.x;

    const yMove = collideHorizontalAxis(nextX, nextY, nextZ, x, y, "y");
    nextY = yMove.y;

    if(xMove.hit && !yMove.hit){
      vx *= 0.18;
      stepVX = 0;
      nextX = x;
    }else if(yMove.hit && !xMove.hit){
      vy *= 0.18;
      stepVY = 0;
      nextY = y;
    }else if(xMove.hit && yMove.hit){
      vx *= 0.12;
      vy *= 0.12;
      nextX = x;
      nextY = y;
    }

    const resolved = resolveWallPenetration(nextX, nextY, nextZ);
    nextX = resolved.x;
    nextY = resolved.y;
    if(resolved.hit){
      wallHit = true;
      wallNormalX = resolved.normalX;
      wallNormalY = resolved.normalY;
      vx *= 0.55;
      vy *= 0.55;
    }

    x = nextX;
    y = nextY;
    z = nextZ;
  }

  player.vx = vx;
  player.vy = vy;

  return {x, y, z, wallHit, wallNormalX, wallNormalY};
}

function project(wx, wy, wz){
  const dx = wx - player.x;
  const dy = wy - player.y;
  const dz = wz - (player.z + EYE_HEIGHT);

  const sy = Math.sin(player.yaw);
  const cy = Math.cos(player.yaw);
  const x1 = dx * cy - dy * sy;
  const z1 = dx * sy + dy * cy;

  const sp = Math.sin(player.pitch);
  const cp = Math.cos(player.pitch);
  const y2 = dz * cp - z1 * sp;
  const z2 = dz * sp + z1 * cp;

  if(z2 <= 1) return null;

  const scale = FOV / z2;
  return {
    x: canvas.width/2 + x1 * scale,
    y: canvas.height/2 - y2 * scale,
    scale,
    depth: z2
  };
}

function screenRay(u, v){
  const xCam = (u - canvas.width/2) / FOV;
  const yCam = -(v - canvas.height/2) / FOV;
  const zCam = 1;

  const sp = Math.sin(player.pitch);
  const cp = Math.cos(player.pitch);
  let x1 = xCam;
  let y1 = yCam * cp + zCam * sp;
  let z1 = -yCam * sp + zCam * cp;

  const sy = Math.sin(player.yaw);
  const cy = Math.cos(player.yaw);
  const wx = x1 * cy + z1 * sy;
  const wy = -x1 * sy + z1 * cy;
  const wz = y1;
  return {x:wx, y:wy, z:wz};
}


function cameraForwardVector(){
  return {
    x: Math.sin(player.yaw) * Math.cos(player.pitch),
    y: Math.cos(player.yaw) * Math.cos(player.pitch),
    z: Math.sin(player.pitch)
  };
}

function isPointBehindPlayerView(wx, wy, wz){
  const f = cameraForwardVector();
  const vx = wx - player.x;
  const vy = wy - player.y;
  const vz = wz - (player.z + EYE_HEIGHT);
  return (vx*f.x + vy*f.y + vz*f.z) <= 0;
}

function updateNearWallWarning(){
  const f = cameraForwardVector();
  const startX = player.x;
  const startY = player.y;
  const startZ = player.z + EYE_HEIGHT;

  let nearest = Infinity;

  for(let dist=30; dist<=190; dist+=10){
    const wx = startX + f.x * dist;
    const wy = startY + f.y * dist;
    const wz = startZ + f.z * dist;

    for(const box of solidBoxes){
      if(
        wx >= box.x && wx <= box.x + box.w &&
        wy >= box.y && wy <= box.y + box.d &&
        wz >= 0 && wz <= box.h
      ){
        nearest = Math.min(nearest, dist);
      }
    }
  }

  if(nearest < Infinity){
    const strength = Math.max(0, Math.min(1, (190 - nearest) / 160));
    nearWallWarning.style.display = "block";
    nearWallWarning.style.opacity = String(0.35 + strength * 0.65);
    nearWallWarning.style.transform = "translate(-50%,-50%) scale(" + (0.86 + strength * 0.22).toFixed(2) + ")";
  }else{
    nearWallWarning.style.display = "none";
  }
}

function raycastWorldFromScreen(sx, sy, maxDistance=2400, step=10){
  const ray = screenRay(sx, sy);

  const fx = Math.sin(player.yaw) * Math.cos(player.pitch);
  const fy = Math.cos(player.yaw) * Math.cos(player.pitch);
  const fz = Math.sin(player.pitch);

  // カメラ正面方向より後方へのアンカーを強く禁止
  const dot = ray.x * fx + ray.y * fy + ray.z * fz;
  if(dot <= 0.08) return null;

  const startX = player.x;
  const startY = player.y;
  const startZ = player.z + EYE_HEIGHT;

  const MIN_HOOK_DISTANCE = 100;
  let groundCandidate = null;

  for(let dist=20; dist<=maxDistance; dist+=step){
    const wx = startX + ray.x * dist;
    const wy = startY + ray.y * dist;
    const wz = startZ + ray.z * dist;

    // 念のため、計算結果が視線後方に回り込むものは捨てる
    if(isPointBehindPlayerView(wx, wy, wz)){
      continue;
    }

    // 地面も候補。ただし正面方向のみ
    if(wz <= 0 && !groundCandidate){
      const hitDist = Math.hypot(
        wx - player.x,
        wy - player.y,
        0 - (player.z + EYE_HEIGHT)
      );
      if(hitDist >= MIN_HOOK_DISTANCE){
        groundCandidate = {
          x: wx,
          y: wy,
          z: 0,
          hit: true,
          surface: "ground"
        };
      }
    }

    for(const box of solidBoxes){
      if(
        wx >= box.x && wx <= box.x + box.w &&
        wy >= box.y && wy <= box.y + box.d &&
        wz >= 0 && wz <= box.h
      ){
        const hitDist = Math.hypot(
          wx - player.x,
          wy - player.y,
          wz - (player.z + EYE_HEIGHT)
        );

        if(hitDist < MIN_HOOK_DISTANCE){
          // 近すぎる壁は、刺さずに可視化だけする
          continue;
        }

        return {
          x: wx,
          y: wy,
          z: wz,
          hit: true,
          surface: "wall"
        };
      }
    }
  }

  if(groundCandidate){
    return groundCandidate;
  }

  return null;
}

function groundPointForScreen(u, v){
  const originZ = player.z + EYE_HEIGHT;
  const ray = screenRay(u, v);
  if(ray.z >= -0.0001) return null;
  const t = originZ / -ray.z;
  if(t <= 0) return null;
  return {x: player.x + ray.x * t, y: player.y + ray.y * t};
}

function addBoxFaces(list, b, colors){
  const p1 = project(b.x, b.y, 0);
  const p2 = project(b.x+b.w, b.y, 0);
  const p3 = project(b.x+b.w, b.y+b.d, 0);
  const p4 = project(b.x, b.y+b.d, 0);
  const t1 = project(b.x, b.y, b.h);
  const t2 = project(b.x+b.w, b.y, b.h);
  const t3 = project(b.x+b.w, b.y+b.d, b.h);
  const t4 = project(b.x, b.y+b.d, b.h);

  if(!(p1&&p2&&p3&&p4&&t1&&t2&&t3&&t4)) return;

  const faces = [
    {pts:[t1,t2,t3,t4], color:colors.roof},
    {pts:[t1,t2,p2,p1], color:colors.front},
    {pts:[t2,t3,p3,p2], color:colors.right},
    {pts:[t4,t1,p1,p4], color:colors.left}
  ];

  for(const f of faces){
    let depth = 0;
    for(const pt of f.pts) depth += pt.depth;
    f.depth = depth / f.pts.length;
    list.push(f);
  }
}

function drawPoly(pts, color){
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function applySingleWirePhysics(wire){
  if(!wire.hooked) return;

  const px = player.x;
  const py = player.y;
  const pz = player.z + EYE_HEIGHT;

  let dx = px - wire.x;
  let dy = py - wire.y;
  let dz = pz - wire.z;
  let dist = Math.hypot(dx,dy,dz);
  if(dist < 1) dist = 1;

  const nx = dx / dist;
  const ny = dy / dist;
  const nz = dz / dist;

  const speed = Math.hypot(player.vx, player.vy, player.vz);

  if(input.reel){
    const reelStrength = 8 + Math.min(14, dist * 0.012) + Math.min(8, speed * 0.22);
    wire.ropeLength = Math.max(80, wire.ropeLength - reelStrength);
  }else{
    wire.ropeLength = Math.min(wire.ropeLength + 0.6, dist + 22);
  }

  if(dist > wire.ropeLength){
    const excess = dist - wire.ropeLength;

    player.x -= nx * excess;
    player.y -= ny * excess;
    player.z -= nz * excess;

    const radialSpeed = player.vx*nx + player.vy*ny + player.vz*nz;
    if(radialSpeed > 0){
      player.vx -= nx * radialSpeed;
      player.vy -= ny * radialSpeed;
      player.vz -= nz * radialSpeed;
    }

    if(input.reel){
      const pull = 0.68 + Math.min(0.55, excess * 0.012) + Math.min(0.38, speed * 0.01);
      player.vx -= nx * pull;
      player.vy -= ny * pull;
      player.vz -= nz * pull;

      const radialNow = player.vx*nx + player.vy*ny + player.vz*nz;
      const tangentVX = player.vx - nx * radialNow;
      const tangentVY = player.vy - ny * radialNow;
      const tangentVZ = player.vz - nz * radialNow;
      const tangentLen = Math.hypot(tangentVX, tangentVY, tangentVZ);

      if(tangentLen > 0.001){
        const boost = 0.08 + Math.min(0.12, speed * 0.002);
        player.vx += (tangentVX / tangentLen) * boost;
        player.vy += (tangentVY / tangentLen) * boost;
        player.vz += (tangentVZ / tangentLen) * boost;
      }
    }
  }
}

function updateCameraEffects(){
  const leftOn = player.wires.left.hooked ? 1 : 0;
  const rightOn = player.wires.right.hooked ? 1 : 0;
  const sideBias = (rightOn - leftOn) * 0.05;
  const speedBias = clamp((player.vx*Math.cos(player.yaw) - player.vy*Math.sin(player.yaw)) * 0.01, -0.05, 0.05);
  const targetRoll = sideBias + speedBias;
  player.camRoll += (targetRoll - player.camRoll) * 0.08;
}

function shootWire(side, sx, sy){
  const hit = raycastWorldFromScreen(sx, sy, 2400, 10);
  if(hit){
    const wire = player.wires[side];
    wire.hooked = true;
    wire.x = hit.x;
    wire.y = hit.y;
    wire.z = hit.z;
    wire.ropeLength = Math.hypot(player.x-hit.x, player.y-hit.y, (player.z+EYE_HEIGHT)-hit.z);
  }
}

function handleGameTap(e){
  e.preventDefault();

  if(mapOverlay && mapOverlay.style.display === "flex") return;

  const rect = canvas.getBoundingClientRect();

  // 表示上は縮小されているので、内部canvas座標へ変換する。
  const localX = (e.clientX - rect.left) * (canvas.width / rect.width);
  const localY = (e.clientY - rect.top) * (canvas.height / rect.height);

  const side = localX < canvas.width / 2 ? "left" : "right";
  shootWire(side, localX, localY);
}

tapShield.addEventListener("pointerdown", handleGameTap, {passive:false});

function tryAutoWallKick(wallHit, normalX, normalY){
  if(!wallHit) return;
  if(player.grounded) return;
  if(player.wallKickCooldown > 0) return;

  const hasWire = player.wires.left.hooked || player.wires.right.hooked;
  const horizontalSpeed = Math.hypot(player.vx, player.vy);

  // 空中かつ壁に接触していて、ある程度スピードがある or ワイヤー使用中なら発動
  if(!hasWire && horizontalSpeed < 4) return;

  const outwardBoost = 7.5;
  const upwardBoost = 4.8;
  const tangentialBoost = 1.2;

  // 壁の反対方向へ押し返す
  player.vx += normalX * outwardBoost;
  player.vy += normalY * outwardBoost;
  player.vz = Math.max(player.vz, upwardBoost);

  // 少し進行方向も残して気持ちよくする
  const len = Math.hypot(player.vx, player.vy) || 1;
  player.vx += (player.vx / len) * tangentialBoost;
  player.vy += (player.vy / len) * tangentialBoost;

  player.wallKickCooldown = 18;
  player.wallKickTimer = 12;
  player.lastWallNormalX = normalX;
  player.lastWallNormalY = normalY;
}


function getRankFromTime(seconds){
  if(seconds <= 18) return "S";
  if(seconds <= 28) return "A";
  if(seconds <= 40) return "B";
  if(seconds <= 55) return "C";
  return "D";
}

function formatSeconds(seconds){
  return seconds.toFixed(2);
}


function updateAutoCamera(){
  const targetYaw = Math.atan2(goal.x - player.x, goal.y - player.y);
  let diff = targetYaw - player.yaw;
  while(diff > Math.PI) diff -= Math.PI * 2;
  while(diff < -Math.PI) diff += Math.PI * 2;
  player.yaw += diff * 0.06;

  const horizontalDist = Math.hypot(goal.x - player.x, goal.y - player.y);
  const targetPitch = clamp(0.22 + (player.z / 1400) - Math.min(0.18, horizontalDist / 12000), -0.15, 0.85);
  player.pitch += (targetPitch - player.pitch) * 0.05;
}



const avatarState = {
  headR: 16, torsoLen: 36, upperArm: 24, foreArm: 18, thigh: 28, shin: 26,
  torsoAngle: Math.PI/2,
  lShoulder: 2.6, rShoulder: 0.55, lElbow: 2.2, rElbow: 0.95,
  lHip: 2.1, rHip: 1.0, lKnee: 2.0, rKnee: 1.1,
  bodyOffsetX: 0, bodyOffsetY: 0,
  shoulderDrop: 0, pelvisTilt: 0, neckForward: 0
};

function lerpVal(a,b,t){ return a + (b-a)*t; }

function drawLimb(x1, y1, x2, y2, width=6){
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineWidth = width;
  ctx.stroke();
}

function posePoint(x, y, len, ang){
  return {x: x + Math.cos(ang) * len, y: y + Math.sin(ang) * len};
}

function update(){
  if(autoCameraMode){
    updateAutoCamera();
  }else{
    if(input.left) player.yaw -= 0.04;
    if(input.right) player.yaw += 0.04;
    if(input.up) player.pitch += 0.02;
    if(input.down) player.pitch -= 0.02;
  }
  player.pitch = clamp(player.pitch, -1.45, 1.45);

  const wasGrounded = player.grounded;
  if(player.wallKickCooldown > 0) player.wallKickCooldown--;
  if(player.landingTimer > 0) player.landingTimer--;
  if(player.wallTouchTimer > 0) player.wallTouchTimer--;
  if(player.wallKickTimer > 0) player.wallKickTimer--;
  if(player.jumpTimer > 0) player.jumpTimer--;

  if(input.release){
    player.wires.left.hooked = false;
    player.wires.right.hooked = false;
  }

  const prevX = player.x;
  const prevY = player.y;
  const prevZ = player.z;

  player.vz -= GRAVITY;

  const moved = movePlayerWithCollisions(prevX, prevY, prevZ);
  player.x = moved.x;
  player.y = moved.y;
  player.z = moved.z;

  applySingleWirePhysics(player.wires.left);
  applySingleWirePhysics(player.wires.right);

  // ワイヤー後も複数回押し出して、壁内部を強く否定する
  let postWireWallHit = moved.wallHit;
  let postWireNormalX = moved.wallNormalX;
  let postWireNormalY = moved.wallNormalY;

  for(let i=0; i<4; i++){
    const resolvedAfterWire = resolveWallPenetration(player.x, player.y, player.z);
    player.x = resolvedAfterWire.x;
    player.y = resolvedAfterWire.y;
    if(resolvedAfterWire.hit){
      postWireWallHit = true;
      postWireNormalX = resolvedAfterWire.normalX;
      postWireNormalY = resolvedAfterWire.normalY;
      player.vx *= 0.22;
      player.vy *= 0.22;
    }else{
      break;
    }
  }

  // 最終保険: 壁内部に残っていたら、そのフレームの開始位置へ少し戻す
  const finalCheck = resolveWallPenetration(player.x, player.y, player.z);
  if(finalCheck.hit){
    postWireWallHit = true;
    postWireNormalX = finalCheck.normalX;
    postWireNormalY = finalCheck.normalY;
    player.x = prevX + (finalCheck.x - prevX) * 0.35;
    player.y = prevY + (finalCheck.y - prevY) * 0.35;
    player.vx *= 0.12;
    player.vy *= 0.12;
  }else{
    player.x = finalCheck.x;
    player.y = finalCheck.y;
  }

  const support = getSupportHeight(player.x, player.y, player.z, prevZ);
  if(player.z <= support.height){
    player.z = support.height;
    if(player.vz < 0) player.vz = 0;
    player.grounded = true;
    player.onRoof = support.type === "ROOF";
  }else{
    player.grounded = false;
    player.onRoof = false;
  }

  // アニメ用の着壁状態
  if(postWireWallHit && !player.grounded){
    player.wallTouchTimer = 3;
  }

  // A: 自動壁蹴り
  tryAutoWallKick(postWireWallHit, postWireNormalX, postWireNormalY);

  // ジャンプ / 着地の遷移
  if(wasGrounded && !player.grounded && player.vz > 1.1){
    player.jumpTimer = 10;
  }
  if(!wasGrounded && player.grounded){
    player.landingTimer = 10;
  }

  player.vx *= DRAG_XY;
  player.vy *= DRAG_XY;
  player.vz *= DRAG_Z;

  updateCameraEffects();

  const elapsed = clearTime !== null ? clearTime : (performance.now() - runStartTime) / 1000;

  const dx = goal.x - player.x;
  const dy = goal.y - player.y;
  if(Math.hypot(dx,dy) < 180 && !goal.cleared){
    goal.cleared = true;
    clearTime = elapsed;
    const rank = getRankFromTime(clearTime);
    clearUI.style.display = "block";
    resultText.textContent = "TIME " + formatSeconds(clearTime) + " / RANK " + rank;
    resultText.style.display = "block";
  }

  timeText.textContent = "T:" + formatSeconds(elapsed);
  heightText.textContent = "H:" + Math.floor(player.z);
  speedText.textContent = "S:" + Math.floor(Math.hypot(player.vx,player.vy,player.vz)*100);
  wireText.textContent =
    "L:" + (player.wires.left.hooked ? "ON" : "OFF") +
    " / R:" + (player.wires.right.hooked ? "ON" : "OFF");
  stateText.textContent = player.onRoof ? "ROOF" : (player.grounded ? "GROUND" : "AIR");
}

function drawSkyAndGround(){
  const skyGrad = ctx.createLinearGradient(0,0,0,canvas.height);
  skyGrad.addColorStop(0,"#66c1ff");
  skyGrad.addColorStop(0.55,"#d9f3ff");
  skyGrad.addColorStop(1,"#f8fcff");
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const cloudShift = (player.yaw * 220) % 280;
  ctx.fillStyle = "rgba(255,255,255,.42)";
  for(let i=-2;i<7;i++){
    const x = i*210 - cloudShift;
    const y = 90 + Math.sin(i*0.7 + player.yaw*0.7)*12 + player.pitch*70;
    ctx.beginPath();
    ctx.ellipse(x+60, y, 48, 18, 0, 0, Math.PI*2);
    ctx.ellipse(x+112, y+4, 60, 22, 0, 0, Math.PI*2);
    ctx.ellipse(x+165, y, 44, 16, 0, 0, Math.PI*2);
    ctx.fill();
  }

  const rowStep = 4;
  for(let y=0; y<canvas.height; y+=rowStep){
    const gpMid = groundPointForScreen(canvas.width/2, y + rowStep*0.5);
    if(!gpMid) continue;

    const stripeX = Math.floor(gpMid.x / 210);
    const stripeY = Math.floor(gpMid.y / 210);
    const checker = (stripeX + stripeY) & 1;

    const dist = Math.min(1, Math.hypot(gpMid.x-player.x, gpMid.y-player.y) / 7000);
    const fade = 1 - dist * 0.5;
    const roadBand = (Math.abs((gpMid.x % 420 + 420) % 420 - 210) < 28 || Math.abs((gpMid.y % 420 + 420) % 420 - 210) < 28);

    let baseR = checker ? 110 : 122;
    let baseG = checker ? 158 : 172;
    let baseB = checker ? 76 : 88;

    if(roadBand){
      baseR = 156; baseG = 146; baseB = 128;
    }

    const r = Math.max(0, Math.floor(baseR * fade));
    const g = Math.max(0, Math.floor(baseG * fade));
    const b = Math.max(0, Math.floor(baseB * fade));
    ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
    ctx.fillRect(0, y, canvas.width, rowStep+1);
  }
}


function getBuildingPalette(b){
  if(b.style === "brick"){
    return {roof:"#7c3f35", front:"#b46b57", right:"#9f5845", left:"#8d4d3c", win:"#d9ebf9"};
  }
  if(b.style === "stone"){
    return {roof:"#6e6258", front:"#c6b6a6", right:"#b5a392", left:"#a18f80", win:"#d7e8f6"};
  }
  if(b.style === "timber"){
    return {roof:"#6b3a30", front:"#d9c3a1", right:"#b7926b", left:"#9f7b57", win:"#dce9f5"};
  }
  if(b.style === "tower"){
    return {roof:"#6a4738", front:"#c8ae90", right:"#b69073", left:"#9f7a62", win:"#d9edf8"};
  }
  return {roof:"#954c3e", front:"#d7b28d", right:"#c4926b", left:"#ae7c58", win:"#dbeaf7"};
}

function drawProjectedRect(p1,p2,p3,p4,color){
  if(!(p1&&p2&&p3&&p4)) return;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(p1.x,p1.y);
  ctx.lineTo(p2.x,p2.y);
  ctx.lineTo(p3.x,p3.y);
  ctx.lineTo(p4.x,p4.y);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawBuildingWindows(b, pal){
  const centerX = b.x + b.w * 0.5;
  const centerY = b.y + b.d * 0.5;
  const distToBuilding = Math.hypot(centerX - player.x, centerY - player.y);

  // 近距離では窓や屋根縁を描かない。壁面の透け感を防ぐ
  if(distToBuilding < 260) return;

  const spacingX = 48;
  const spacingY = 66;
  const marginX = 20;
  const marginTop = 24;
  const rows = Math.max(1, Math.floor((b.h - 40) / spacingY));
  const colsFront = Math.max(1, Math.floor((b.w - marginX*2) / spacingX));
  const colsSide = Math.max(1, Math.floor((b.d - marginX*2) / spacingX));

  // プレイヤー位置に応じて、見えている面だけに窓を出す
  const showFront = player.y < b.y;
  const showBack = player.y > b.y + b.d;
  const showRight = player.x > b.x + b.w;
  const showLeft = player.x < b.x;

  if(showFront){
    for(let r=0; r<rows; r++){
      for(let c=0; c<colsFront; c++){
        const wx = b.x + marginX + c*spacingX;
        const wy = b.y + 1;
        const wz = 18 + marginTop + r*spacingY;
        const ww = 18, wh = 28;

        const p1 = project(wx, wy, wz);
        const p2 = project(wx+ww, wy, wz);
        const p3 = project(wx+ww, wy, wz+wh);
        const p4 = project(wx, wy, wz+wh);
        drawProjectedRect(p1,p2,p3,p4,pal.win);
      }
    }
  }

  if(showBack){
    for(let r=0; r<rows; r++){
      for(let c=0; c<colsFront; c++){
        const wx = b.x + marginX + c*spacingX;
        const wy = b.y + b.d - 1;
        const wz = 18 + marginTop + r*spacingY;
        const ww = 18, wh = 28;

        const p1 = project(wx, wy, wz);
        const p2 = project(wx+ww, wy, wz);
        const p3 = project(wx+ww, wy, wz+wh);
        const p4 = project(wx, wy, wz+wh);
        drawProjectedRect(p1,p2,p3,p4,pal.win);
      }
    }
  }

  if(showRight){
    for(let r=0; r<rows; r++){
      for(let c=0; c<colsSide; c++){
        const wx = b.x + b.w - 1;
        const wy = b.y + marginX + c*spacingX;
        const wz = 18 + marginTop + r*spacingY;
        const ww = 18, wh = 28;

        const p1 = project(wx, wy, wz);
        const p2 = project(wx, wy+ww, wz);
        const p3 = project(wx, wy+ww, wz+wh);
        const p4 = project(wx, wy, wz+wh);
        drawProjectedRect(p1,p2,p3,p4,pal.win);
      }
    }
  }

  if(showLeft){
    for(let r=0; r<rows; r++){
      for(let c=0; c<colsSide; c++){
        const wx = b.x + 1;
        const wy = b.y + marginX + c*spacingX;
        const wz = 18 + marginTop + r*spacingY;
        const ww = 18, wh = 28;

        const p1 = project(wx, wy, wz);
        const p2 = project(wx, wy+ww, wz);
        const p3 = project(wx, wy+ww, wz+wh);
        const p4 = project(wx, wy, wz+wh);
        drawProjectedRect(p1,p2,p3,p4,pal.win);
      }
    }
  }

  // 屋根枠も遠距離のときだけ描く
  if((b.style === "timber" || b.style === "plaster") && distToBuilding > 360){
    const r1 = project(b.x, b.y, b.h);
    const r2 = project(b.x+b.w, b.y, b.h);
    const r3 = project(b.x+b.w, b.y+b.d, b.h);
    const r4 = project(b.x, b.y+b.d, b.h);
    if(r1&&r2&&r3&&r4){
      ctx.strokeStyle = "rgba(60,40,30,.22)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(r1.x,r1.y);
      ctx.lineTo(r2.x,r2.y);
      ctx.lineTo(r3.x,r3.y);
      ctx.lineTo(r4.x,r4.y);
      ctx.closePath();
      ctx.stroke();
    }
  }
}

function drawRoadGuideLines(){
  ctx.strokeStyle = "rgba(255,255,255,.08)";
  ctx.lineWidth = 1;
  for(let gx=850; gx<=9800; gx+=420){
    let started = false;
    ctx.beginPath();
    for(let gy=850; gy<=9800; gy+=220){
      const p = project(gx, gy, 0);
      if(!p) continue;
      if(!started){ ctx.moveTo(p.x,p.y); started = true; } else { ctx.lineTo(p.x,p.y); }
    }
    if(started) ctx.stroke();
  }
}

function drawWorld(){
  // 道路ガイドは先に描く
  drawRoadGuideLines();

  // 建物ごとに奥から手前へ描画し、窓も同じ建物の直後に描く
  const worldObjects = [
    ...buildings.map(b => ({type:"building", box:b})),
    ...landmarks.map(b => ({type:"landmark", box:b})),
    ...worldWalls.map(b => ({type:"wall", box:b}))
  ];

  worldObjects.sort((a,b) => {
    const acx = a.box.x + a.box.w * 0.5;
    const acy = a.box.y + a.box.d * 0.5;
    const bcx = b.box.x + b.box.w * 0.5;
    const bcy = b.box.y + b.box.d * 0.5;

    const ad = (acx - player.x) * (acx - player.x) + (acy - player.y) * (acy - player.y);
    const bd = (bcx - player.x) * (bcx - player.x) + (bcy - player.y) * (bcy - player.y);
    return bd - ad; // 遠い順
  });

  for(const obj of worldObjects){
    const b = obj.box;
    let pal;

    if(obj.type === "wall"){
      pal = {
        roof:"#918e89",
        front:"#d2cdc6",
        right:"#bbb6ae",
        left:"#a6a199"
      };
    }else{
      pal = getBuildingPalette(b);
    }

    const faces = [];
    addBoxFaces(faces, b, {
      roof:pal.roof,
      front:pal.front,
      right:pal.right,
      left:pal.left
    });

    faces.sort((a,b)=>b.depth-a.depth);
    for(const f of faces) drawPoly(f.pts, f.color);

    if(obj.type !== "wall"){
      drawBuildingWindows(b, getBuildingPalette(b));
    }
  }
}

function drawGoal(){
  if(goal.cleared) return;
  const lb = project(goal.x, goal.y, 0);
  const lt = project(goal.x, goal.y, goal.h);
  const rb = project(goal.x+goal.w, goal.y, 0);
  const rt = project(goal.x+goal.w, goal.y, goal.h);
  if(!(lb&&lt&&rb&&rt)) return;

  ctx.strokeStyle = "lime";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(lb.x, lb.y);
  ctx.lineTo(lt.x, lt.y);
  ctx.lineTo(rt.x, rt.y);
  ctx.lineTo(rb.x, rb.y);
  ctx.stroke();

  ctx.fillStyle = "rgba(180,255,180,.16)";
  ctx.beginPath();
  ctx.moveTo(lb.x, lb.y);
  ctx.lineTo(lt.x, lt.y);
  ctx.lineTo(rt.x, rt.y);
  ctx.lineTo(rb.x, rb.y);
  ctx.closePath();
  ctx.fill();
}

function drawOneWire(wire, startX){
  if(!wire.hooked) return;
  const hook = project(wire.x, wire.y, wire.z);
  if(!hook) return;

  ctx.beginPath();
  ctx.moveTo(startX, canvas.height*0.82);
  ctx.lineTo(hook.x, hook.y);
  ctx.strokeStyle = "#1d1d1d";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(hook.x, hook.y, Math.max(3, 8*hook.scale), 0, Math.PI*2);
  ctx.fillStyle = "#2e2e2e";
  ctx.fill();
}

function drawWires(){
  drawOneWire(player.wires.left, canvas.width/2 - 20);
  drawOneWire(player.wires.right, canvas.width/2 + 20);
}

function drawArrow(){
  if(goal.cleared) return;
  const dx = goal.x - player.x;
  const dy = goal.y - player.y;
  const angle = Math.atan2(dx, dy) - player.yaw;
  ctx.save();
  ctx.translate(canvas.width - 72, 70);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0,-24);
  ctx.lineTo(15,16);
  ctx.lineTo(-15,16);
  ctx.closePath();
  ctx.fillStyle = "lime";
  ctx.fill();
  ctx.restore();
}

function drawAvatar(){
  const x = canvas.width/2;
  const y = canvas.height*0.84;

  ctx.strokeStyle = "#111";
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.fillStyle = "#111";

  const hasWire = player.wires.left.hooked || player.wires.right.hooked;
  const isReeling = input.reel && hasWire;
  const isFalling = !player.grounded && player.vz < -1.0;
  const isJumping = !player.grounded && player.vz > 1.0;
  const isLanding = player.landingTimer > 0;
  const isWallTouch = player.wallTouchTimer > 0 && !player.grounded;
  const isWallKick = player.wallKickTimer > 0;

  const t = performance.now() * 0.012;
  const target = {
    headR: 16, torsoLen: 38, upperArm: 25, foreArm: 20, thigh: 30, shin: 28,
    torsoAngle: Math.PI/2,
    lShoulder: 2.45, rShoulder: 0.7, lElbow: 2.1, rElbow: 1.0,
    lHip: 2.0, rHip: 1.15, lKnee: 1.9, rKnee: 1.25,
    bodyOffsetX: 0, bodyOffsetY: 0,
    shoulderDrop: 0, pelvisTilt: 0, neckForward: 0
  };

  if(player.grounded && !isLanding){
    target.torsoAngle = Math.PI/2 + Math.sin(t)*0.025;
    target.lShoulder += Math.sin(t)*0.08;
    target.rShoulder -= Math.sin(t)*0.08;
    target.lHip += Math.sin(t+0.5)*0.05;
    target.rHip -= Math.sin(t+0.5)*0.05;
  }

  if(isReeling){
    target.torsoAngle = Math.PI/2 + 0.22;
    target.neckForward = 5;
    target.lShoulder = 3.65;
    target.rShoulder = -0.5;
    target.lElbow = 4.15;
    target.rElbow = -0.2;
    target.lHip = 1.9;
    target.rHip = 1.32;
    target.lKnee = 2.35;
    target.rKnee = 0.82;
    target.bodyOffsetY = -6;
    target.pelvisTilt = 0.06;
  }else if(isWallKick){
    const kickBias = player.lastWallNormalX >= 0 ? 1 : -1;
    target.torsoAngle = Math.PI/2 - 0.18 * kickBias;
    target.bodyOffsetX = -kickBias * 10;
    target.bodyOffsetY = -3;
    target.shoulderDrop = -2 * kickBias;
    target.pelvisTilt = 0.10 * kickBias;
    target.neckForward = 4;

    if(kickBias > 0){
      target.lShoulder = 3.15; target.lElbow = 3.95;
      target.rShoulder = 0.45; target.rElbow = 0.95;
      target.lHip = 2.75; target.lKnee = 2.95;
      target.rHip = 0.82; target.rKnee = 0.92;
    }else{
      target.rShoulder = -0.15; target.rElbow = -0.05;
      target.lShoulder = 2.55; target.lElbow = 2.1;
      target.rHip = 0.35; target.rKnee = 0.35;
      target.lHip = 2.15; target.lKnee = 2.2;
    }
  }else if(isWallTouch){
    const wallBias = player.lastWallNormalX >= 0 ? 1 : -1;
    target.torsoAngle = Math.PI/2 - 0.10 * wallBias;
    target.bodyOffsetX = -wallBias * 7;
    target.shoulderDrop = -3 * wallBias;
    target.pelvisTilt = 0.08 * wallBias;
    target.neckForward = 2;
    if(wallBias > 0){
      target.lShoulder = 3.0; target.lElbow = 3.45;
      target.rShoulder = 0.55; target.rElbow = 0.95;
      target.lHip = 2.35; target.lKnee = 2.5;
      target.rHip = 0.95; target.rKnee = 1.05;
    }else{
      target.rShoulder = 0.05; target.rElbow = 0.35;
      target.lShoulder = 2.6; target.lElbow = 2.15;
      target.rHip = 0.55; target.rKnee = 0.65;
      target.lHip = 2.05; target.lKnee = 2.05;
    }
  }else if(isLanding){
    const squash = player.landingTimer / 10;
    target.torsoLen = 32;
    target.upperArm = 23;
    target.thigh = 26;
    target.shin = 24;
    target.torsoAngle = Math.PI/2 + 0.08;
    target.lShoulder = 2.9; target.rShoulder = 0.28;
    target.lElbow = 2.25; target.rElbow = 0.95;
    target.lHip = 2.1; target.rHip = 1.05;
    target.lKnee = 1.28; target.rKnee = 1.86;
    target.bodyOffsetY = 10 * squash;
    target.neckForward = 2;
  }else if(isFalling){
    target.torsoAngle = Math.PI/2 - 0.05;
    target.lShoulder = 2.2; target.rShoulder = 1.0;
    target.lElbow = 2.0; target.rElbow = 1.15;
    target.lHip = 1.95; target.rHip = 1.18;
    target.lKnee = 1.78; target.rKnee = 1.38;
    target.bodyOffsetY = 2;
  }else if(isJumping || player.jumpTimer > 0){
    target.torsoAngle = Math.PI/2 - 0.10;
    target.neckForward = 3;
    target.lShoulder = 3.15; target.rShoulder = -0.22;
    target.lElbow = 3.8; target.rElbow = 0.1;
    target.lHip = 2.3; target.rHip = 0.95;
    target.lKnee = 2.5; target.rKnee = 0.78;
    target.bodyOffsetY = -5;
  }

  const smooth = isLanding || isWallKick ? 0.22 : 0.16;
  for(const k of Object.keys(target)){
    avatarState[k] = lerpVal(avatarState[k], target[k], smooth);
  }

  const hx = x + avatarState.bodyOffsetX;
  const hy = y + avatarState.bodyOffsetY;

  ctx.beginPath();
  ctx.arc(hx, hy, avatarState.headR, 0, Math.PI*2);
  ctx.fill();

  const neckBase = {x: hx + avatarState.neckForward, y: hy + 18};
  const pelvis = posePoint(neckBase.x, neckBase.y, avatarState.torsoLen, avatarState.torsoAngle);
  drawLimb(neckBase.x, neckBase.y, pelvis.x, pelvis.y, 6);

  ctx.fillRect(pelvis.x - 20, pelvis.y - 4, 40, 8);

  const shoulderCenter = {x: neckBase.x, y: hy + 31};

  const lElbowPt = posePoint(shoulderCenter.x - 3, shoulderCenter.y + avatarState.shoulderDrop, avatarState.upperArm, avatarState.lShoulder);
  const rElbowPt = posePoint(shoulderCenter.x + 3, shoulderCenter.y - avatarState.shoulderDrop, avatarState.upperArm, avatarState.rShoulder);
  const lHandPt = posePoint(lElbowPt.x, lElbowPt.y, avatarState.foreArm, avatarState.lElbow);
  const rHandPt = posePoint(rElbowPt.x, rElbowPt.y, avatarState.foreArm, avatarState.rElbow);

  drawLimb(shoulderCenter.x, shoulderCenter.y, lElbowPt.x, lElbowPt.y, 6);
  drawLimb(shoulderCenter.x, shoulderCenter.y, rElbowPt.x, rElbowPt.y, 6);
  drawLimb(lElbowPt.x, lElbowPt.y, lHandPt.x, lHandPt.y, 5);
  drawLimb(rElbowPt.x, rElbowPt.y, rHandPt.x, rHandPt.y, 5);

  const pelvisCenter = {x: pelvis.x, y: pelvis.y};
  const lKneePt = posePoint(pelvisCenter.x, pelvisCenter.y, avatarState.thigh, avatarState.lHip + avatarState.pelvisTilt);
  const rKneePt = posePoint(pelvisCenter.x, pelvisCenter.y, avatarState.thigh, avatarState.rHip + avatarState.pelvisTilt);
  const lFootPt = posePoint(lKneePt.x, lKneePt.y, avatarState.shin, avatarState.lKnee);
  const rFootPt = posePoint(rKneePt.x, rKneePt.y, avatarState.shin, avatarState.rKnee);

  drawLimb(pelvisCenter.x, pelvisCenter.y, lKneePt.x, lKneePt.y, 6);
  drawLimb(pelvisCenter.x, pelvisCenter.y, rKneePt.x, rKneePt.y, 6);
  drawLimb(lKneePt.x, lKneePt.y, lFootPt.x, lFootPt.y, 5);
  drawLimb(rKneePt.x, rKneePt.y, rFootPt.x, rFootPt.y, 5);
}

// ---- Maps ----
function worldBounds(){
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for(const b of solidBoxes){
    minX = Math.min(minX, b.x);
    minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x + b.w);
    maxY = Math.max(maxY, b.y + b.d);
  }
  minX = Math.min(minX, goal.x);
  minY = Math.min(minY, goal.y);
  maxX = Math.max(maxX, goal.x + goal.w);
  maxY = Math.max(maxY, goal.y + goal.h);
  return {minX, minY, maxX, maxY};
}
const MAP_BOUNDS = worldBounds();

function drawMapBase(ctx2, w, h, cameraCentered){
  ctx2.clearRect(0,0,w,h);
  ctx2.fillStyle = "#eef1f3";
  ctx2.fillRect(0,0,w,h);

  let minX, minY, scale, offsetX=0, offsetY=0;
  if(cameraCentered){
    const span = 3600;
    minX = player.x - span/2;
    minY = player.y - span/2;
    scale = Math.min(w/span, h/span);
  }else{
    const pad = 300;
    const worldW = (MAP_BOUNDS.maxX - MAP_BOUNDS.minX) + pad*2;
    const worldH = (MAP_BOUNDS.maxY - MAP_BOUNDS.minY) + pad*2;
    minX = MAP_BOUNDS.minX - pad;
    minY = MAP_BOUNDS.minY - pad;
    scale = Math.min(w/worldW, h/worldH);
    offsetX = (w - worldW*scale)/2;
    offsetY = (h - worldH*scale)/2;
  }

  function tx(x){ return offsetX + (x - minX) * scale; }
  function ty(y){ return offsetY + (y - minY) * scale; }

  ctx2.strokeStyle = "rgba(160,160,160,.18)";
  ctx2.lineWidth = 1;
  for(let gx=0; gx<20000; gx+=420){
    const x = tx(gx);
    if(x < 0 || x > w) continue;
    ctx2.beginPath(); ctx2.moveTo(x,0); ctx2.lineTo(x,h); ctx2.stroke();
  }
  for(let gy=0; gy<20000; gy+=420){
    const y = ty(gy);
    if(y < 0 || y > h) continue;
    ctx2.beginPath(); ctx2.moveTo(0,y); ctx2.lineTo(w,y); ctx2.stroke();
  }

  for(const b of buildings){
    ctx2.fillStyle = "#b98b64";
    ctx2.fillRect(tx(b.x), ty(b.y), Math.max(1,b.w*scale), Math.max(1,b.d*scale));
  }
  for(const b of landmarks){
    ctx2.fillStyle = "#8f5e43";
    ctx2.fillRect(tx(b.x), ty(b.y), Math.max(1,b.w*scale), Math.max(1,b.d*scale));
  }
  for(const b of worldWalls){
    ctx2.fillStyle = "#c6c8ca";
    ctx2.fillRect(tx(b.x), ty(b.y), Math.max(1,b.w*scale), Math.max(1,b.d*scale));
  }

  ctx2.strokeStyle = "lime";
  ctx2.lineWidth = 2;
  ctx2.strokeRect(tx(goal.x), ty(goal.y), Math.max(2,goal.w*scale), Math.max(2,30*scale));

  const shoulderL = {x: player.x - Math.cos(player.yaw)*25, y: player.y + Math.sin(player.yaw)*25};
  const shoulderR = {x: player.x + Math.cos(player.yaw)*25, y: player.y - Math.sin(player.yaw)*25};

  if(player.wires.left.hooked){
    ctx2.strokeStyle = "#2563eb";
    ctx2.lineWidth = 2;
    ctx2.beginPath();
    ctx2.moveTo(tx(shoulderL.x), ty(shoulderL.y));
    ctx2.lineTo(tx(player.wires.left.x), ty(player.wires.left.y));
    ctx2.stroke();
  }
  if(player.wires.right.hooked){
    ctx2.strokeStyle = "#dc2626";
    ctx2.lineWidth = 2;
    ctx2.beginPath();
    ctx2.moveTo(tx(shoulderR.x), ty(shoulderR.y));
    ctx2.lineTo(tx(player.wires.right.x), ty(player.wires.right.y));
    ctx2.stroke();
  }

  const px = tx(player.x), py = ty(player.y);
  ctx2.fillStyle = "#111";
  ctx2.beginPath(); ctx2.arc(px, py, Math.max(3, 8*scale), 0, Math.PI*2); ctx2.fill();

  const dirLen = Math.max(12, 50*scale);
  ctx2.strokeStyle = "#111";
  ctx2.lineWidth = 2;
  ctx2.beginPath();
  ctx2.moveTo(px, py);
  ctx2.lineTo(px + Math.sin(player.yaw)*dirLen, py + Math.cos(player.yaw)*dirLen);
  ctx2.stroke();

  if(!cameraCentered){
    const span = 2900;
    const rx = tx(player.x - span/2);
    const ry = ty(player.y - span/2);
    const rw = span * scale;
    const rh = span * scale;
    ctx2.strokeStyle = "rgba(17,17,17,.45)";
    ctx2.lineWidth = 2;
    ctx2.strokeRect(rx, ry, rw, rh);
  }
}

function drawMaps(){
  drawMapBase(minimapCtx, minimapCanvas.width, minimapCanvas.height, true);
  if(mapOverlay.style.display === "flex"){
    drawMapBase(fullMapCtx, fullMapCanvas.width, fullMapCanvas.height, false);
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.rotate(player.camRoll);
  ctx.translate(-canvas.width/2, -canvas.height/2);

  drawSkyAndGround();
  drawWorld();
  drawGoal();
  drawWires();
  drawArrow();
  drawAvatar();
  updateNearWallWarning();

  ctx.restore();
  drawMaps();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
